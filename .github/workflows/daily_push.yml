name: Daily News Push

on:
  schedule:
    # 每天 8:00 UTC+8 = 0:00 UTC
    - cron: '0 0 * * *'
    # 周一至周五 20:00 UTC+8 = 12:00 UTC
    - cron: '0 12 * * 1-5'
    # 周六 20:00 UTC+8 = 12:00 UTC
    - cron: '0 12 * * 6'
  workflow_dispatch:  # 手动触发

jobs:
  morning-push:
    if: github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run morning push
        env:
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
          MODE: morning
        run: |
          python daily_push.py morning

  daily-report:
    if: github.event.schedule == '0 12 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run daily report
        env:
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
        run: |
          python daily_push.py daily

  weekly-report:
    if: github.event.schedule == '0 12 * * 6'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run weekly report
        env:
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
        run: |
          python daily_push.py weekly
