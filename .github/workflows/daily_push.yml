name: Daily News Push

on:
  schedule:
    # 北京时间 8:00 = UTC 0:00
    - cron: '0 0 * * *'
    # 北京时间 20:00 = UTC 12:00 (周一至周五)
    - cron: '0 12 * * 1-5'
    # 北京时间 20:00 = UTC 12:00 (周六)
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run
        env:
          DINGTALK_WEBHOOKS: ${{ secrets.DINGTALK_WEBHOOKS }}
        run: |
          python daily_push.py ${{ github.event_name == 'workflow_dispatch' && 'morning' || 'morning' }}
